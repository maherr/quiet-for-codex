name: setup-rusty-v8
description: Download and verify manifest-pinned rusty_v8 artifacts for Cargo builds.
inputs:
  target:
    description: Rust target triple with Codex-built V8 release artifacts.
    required: true

runs:
  using: composite
  steps:
    - name: Configure manifest-pinned rusty_v8 artifact overrides
      shell: bash
      env:
        TARGET: ${{ inputs.target }}
      run: |
        set -euo pipefail
        python_bin=python3
        if ! command -v "$python_bin" >/dev/null 2>&1; then
          python_bin=python
        fi
        "$python_bin" "${GITHUB_WORKSPACE}/scripts/release/prepare_v8_artifacts.py" \
          --target "$TARGET" \
          --output-dir "${RUNNER_TEMP}/rusty_v8/${TARGET}" \
          --github-env "${GITHUB_ENV}"
